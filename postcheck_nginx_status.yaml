---
- name: check nginx status on target machine
  hosts: targetnodes
  gather_facts: false
  tasks:
    - name: check nginx service status after some action
      ansible.builtin.shell: systemctl is-active nginx
      register: post_nginx_status
      ignore_errors: true

    - name: print nginx status
      debug:
        var: post_nginx_status.stdout
        verbosity: 1
    - name: Save nginx post status to file
      ansible.builtin.copy:
        content: "{{ post_nginx_status.stdout }}\n"
        dest: /tmp/{{ inventory_hostname }}_post_nginx_status.txt
    - name: list files from user home directory after some action
      ansible.builtin.find:
        paths: /home/githuba/postdir
        file_type: any
      register: post_home_files
      ignore_errors: true
    - name: save the post home directory files list as CSV file
      ansible.builtin.copy:
        content: |
          {% for file in post_home_files.files %}
          {{ file.path }}
          {% endfor %}
        dest: /tmp/{{ inventory_hostname }}_post_home_files.csv
    